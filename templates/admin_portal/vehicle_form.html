{% extends 'base.html' %}
{% block title %}Add Vehicle - GaragePro{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Add Vehicle</h1>
    <div class="bg-white rounded-lg shadow-md p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Owner *</label>
                <select name="customer" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">Select Customer</option>
                    {% for c in customers %}<option value="{{ c.pk }}">{{ c.user.username }} ({{ c.user.phone|default:"-" }})</option>{% endfor %}
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Registration # *</label><input
                        name="registration_number" required
                        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">VIN</label><input name="vin"
                        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Make *</label><input name="make"
                        required
                        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Model *</label><input name="model"
                        required
                        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Year *</label><input name="year"
                        type="number" required
                        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
            </div>
            <div class="flex gap-3 pt-4">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Add
                    Vehicle</button>
                <a href="{% url 'admin_customers_list' %}"
                    class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
