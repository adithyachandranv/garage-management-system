{% extends 'base.html' %}
{% block title %}Generate Invoice - GaragePro{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Generate Invoice</h1>
    <div class="bg-white rounded-lg shadow-md p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Completed Job *</label>
                <select name="job" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">Select Job</option>
                    {% for j in completed_jobs %}<option value="{{ j.pk }}">Job #{{ j.id }} — {{ j.vehicle.registration_number }}</option>{% endfor %}
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Labor Cost (₹) *</label><input
                        name="labor_cost" type="number" step="0.01" required
                        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Tax (₹)</label><input name="tax"
                        type="number" step="0.01" value="0"
                        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Discount (₹)</label><input name="discount"
                    type="number" step="0.01" value="0"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <p class="text-sm text-gray-500"><i class="fas fa-info-circle mr-1"></i>Parts cost is auto-calculated from
                parts used in the job.</p>
            <div class="flex gap-3 pt-4">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Generate
                    Invoice</button>
                <a href="{% url 'admin_billing_list' %}"
                    class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
