{% extends 'base.html' %}
{% block title %}Create Job - GaragePro{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Create Service Job</h1>
    <div class="bg-white rounded-lg shadow-md p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Vehicle *</label>
                <select name="vehicle" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">Select Vehicle</option>
                    {% for v in vehicles %}<option value="{{ v.pk }}">{{ v.registration_number }} — {{ v.make }} {{ v.model }} ({{ v.customer.user.username }})</option>{% endfor %}
                </select>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Assign Mechanic</label>
                <select name="mechanic"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">Leave Unassigned</option>
                    {% for m in mechanics %}<option value="{{ m.pk }}">{{ m.get_full_name|default:m.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Problem Description *</label><textarea
                    name="problem_description" required rows="4"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Priority (1=Low, 5=High)</label><input
                    name="priority" type="number" min="1" max="5" value="1"
                    class="w-32 border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"></div>
            <div class="flex gap-3 pt-4">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Create Job</button>
                <a href="{% url 'admin_jobs_list' %}"
                    class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
