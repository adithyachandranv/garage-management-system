{% extends 'base.html' %}
{% block title %}Update Stock - GaragePro{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Update Stock: {{ inventory.part.name }}</h1>
    <div class="bg-white rounded-lg shadow-md p-6">
        <div class="mb-4 p-4 bg-gray-50 rounded-lg">
            <div class="text-sm text-gray-500">Current Stock</div>
            <div
                class="text-3xl font-bold {% if inventory.stock_quantity <= inventory.low_stock_threshold %}text-red-600{% else %}text-green-600{% endif %}">
                {{ inventory.stock_quantity }}</div>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Movement Type</label>
                <select name="movement_type"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="IN">Stock In</option>
                    <option value="OUT">Stock Out</option>
                </select>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label><input name="quantity"
                    type="number" min="1" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div class="flex gap-3 pt-4">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Update
                    Stock</button>
                <a href="{% url 'admin_inventory_list' %}"
                    class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
