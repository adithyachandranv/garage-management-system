<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GaragePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.5s ease-out forwards;
        }

        .animate-fade-up-d1 {
            animation: fadeUp 0.5s 0.1s ease-out forwards;
            opacity: 0;
        }

        .animate-fade-up-d2 {
            animation: fadeUp 0.5s 0.2s ease-out forwards;
            opacity: 0;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Decorative elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-violet-500/5 rounded-full blur-3xl">
        </div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8 animate-fade-up">
            <div class="inline-flex items-center gap-3 mb-3">
                <div
                    class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center shadow-lg shadow-indigo-500/25">
                    <i class="fas fa-wrench text-white text-xl"></i>
                </div>
                <span class="text-3xl font-extrabold text-white tracking-tight">GaragePro</span>
            </div>
            <p class="text-gray-400 text-sm">Sign in to your account</p>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-3xl shadow-2xl p-8 animate-fade-up-d1">
            <!-- Error messages -->
            {% if form.errors %}
            <div class="mb-6">
                <div
                    class="flex items-center gap-2 p-3 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-200">
                    <i class="fas fa-exclamation-circle"></i>Invalid username or password.
                </div>
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                        <input id="id_username" name="username" type="text" required autofocus
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                            placeholder="Enter your username">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                        <input id="id_password" name="password" type="password" required
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold text-sm shadow-lg shadow-indigo-500/25 hover:shadow-xl hover:shadow-indigo-500/30 hover:from-indigo-700 hover:to-blue-700 transition-all duration-300 transform hover:-translate-y-0.5">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Sign up link -->
        <div class="text-center mt-6 animate-fade-up-d2">
            <span class="text-gray-500 text-sm">Don't have an account?</span>
            <a href="{% url 'signup' %}"
                class="text-indigo-400 hover:text-indigo-300 font-semibold text-sm ml-1 transition">Sign up</a>
        </div>
    </div>
</body>

</html>
