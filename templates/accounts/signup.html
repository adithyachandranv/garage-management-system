<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - GaragePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .role-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .role-card:hover {
            transform: translateY(-4px);
        }

        .role-card.selected {
            ring: 2px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.5s ease-out forwards;
        }

        .animate-fade-up-d1 {
            animation: fadeUp 0.5s 0.1s ease-out forwards;
            opacity: 0;
        }

        .animate-fade-up-d2 {
            animation: fadeUp 0.5s 0.2s ease-out forwards;
            opacity: 0;
        }

        .animate-fade-up-d3 {
            animation: fadeUp 0.5s 0.3s ease-out forwards;
            opacity: 0;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Decorative elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-violet-500/5 rounded-full blur-3xl">
        </div>
    </div>

    <div class="w-full max-w-lg relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8 animate-fade-up">
            <div class="inline-flex items-center gap-3 mb-3">
                <div
                    class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center shadow-lg shadow-indigo-500/25">
                    <i class="fas fa-wrench text-white text-xl"></i>
                </div>
                <span class="text-3xl font-extrabold text-white tracking-tight">GaragePro</span>
            </div>
            <p class="text-gray-400 text-sm">Create your account to get started</p>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-3xl shadow-2xl p-8 animate-fade-up-d1">
            <!-- Error messages -->
            {% if messages %}
            <div class="mb-6">
                {% for message in messages %}
                <div
                    class="flex items-center gap-2 p-3 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-200 mb-2">
                    <i class="fas fa-exclamation-circle"></i>{{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" id="signupForm">
                {% csrf_token %}

                <!-- Role Selection -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">I am a...</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="role-card cursor-pointer">
                            <input type="radio" name="role" value="CUSTOMER" class="hidden peer" {{ customer_checked }}>
                            <div
                                class="border-2 border-gray-200 rounded-2xl p-4 text-center peer-checked:border-indigo-500 peer-checked:bg-indigo-50/50 peer-checked:shadow-lg peer-checked:shadow-indigo-100 transition-all">
                                <div
                                    class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center mx-auto mb-2 shadow-md">
                                    <i class="fas fa-car text-white text-lg"></i>
                                </div>
                                <div class="font-bold text-gray-800 text-sm">Customer</div>
                                <div class="text-xs text-gray-400 mt-0.5">Track my vehicles</div>
                            </div>
                        </label>
                        <label class="role-card cursor-pointer">
                            <input type="radio" name="role" value="MECHANIC" class="hidden peer" {{ mechanic_checked }}>
                            <div
                                class="border-2 border-gray-200 rounded-2xl p-4 text-center peer-checked:border-indigo-500 peer-checked:bg-indigo-50/50 peer-checked:shadow-lg peer-checked:shadow-indigo-100 transition-all">
                                <div
                                    class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center mx-auto mb-2 shadow-md">
                                    <i class="fas fa-tools text-white text-lg"></i>
                                </div>
                                <div class="font-bold text-gray-800 text-sm">Mechanic</div>
                                <div class="text-xs text-gray-400 mt-0.5">Manage repairs</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Name Fields -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">First
                            Name</label>
                        <input type="text" name="first_name" value="{{ form_data.first_name|default:'' }}"
                            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                            placeholder="John">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Last
                            Name</label>
                        <input type="text" name="last_name" value="{{ form_data.last_name|default:'' }}"
                            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                            placeholder="Doe">
                    </div>
                </div>

                <!-- Username -->
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Username
                        <span class="text-red-400">*</span></label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                        <input type="text" name="username" value="{{ form_data.username|default:'' }}" required
                            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                            placeholder="Choose a username">
                    </div>
                </div>

                <!-- Email & Phone -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label
                            class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Email</label>
                        <div class="relative">
                            <i
                                class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                            <input type="email" name="email" value="{{ form_data.email|default:'' }}"
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                                placeholder="you@email.com">
                        </div>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Phone</label>
                        <div class="relative">
                            <i
                                class="fas fa-phone absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                            <input type="tel" name="phone" value="{{ form_data.phone|default:'' }}"
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                                placeholder="1234567890">
                        </div>
                    </div>
                </div>

                <!-- Address (Customer only) -->
                <div id="addressField" class="mb-4">
                    <label
                        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Address</label>
                    <div class="relative">
                        <i class="fas fa-map-marker-alt absolute left-3.5 top-3 text-gray-300 text-sm"></i>
                        <textarea name="address" rows="2"
                            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition resize-none"
                            placeholder="Your address">{{ form_data.address|default:'' }}</textarea>
                    </div>
                </div>

                <!-- Passwords -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div>
                        <label
                            class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Password
                            <span class="text-red-400">*</span></label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                            <input type="password" name="password" required
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                                placeholder="••••••••">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Confirm
                            <span class="text-red-400">*</span></label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                            <input type="password" name="confirm_password" required
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 placeholder-gray-300 input-focus focus:border-indigo-400 focus:outline-none transition"
                                placeholder="••••••••">
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold text-sm shadow-lg shadow-indigo-500/25 hover:shadow-xl hover:shadow-indigo-500/30 hover:from-indigo-700 hover:to-blue-700 transition-all duration-300 transform hover:-translate-y-0.5">
                    Create Account
                </button>
            </form>
        </div>

        <!-- Sign in link -->
        <div class="text-center mt-6 animate-fade-up-d2">
            <span class="text-gray-500 text-sm">Already have an account?</span>
            <a href="{% url 'login' %}"
                class="text-indigo-400 hover:text-indigo-300 font-semibold text-sm ml-1 transition">Sign in</a>
        </div>
    </div>

    <script>
        // Toggle address field visibility based on role
        const roleRadios = document.querySelectorAll('input[name="role"]');
        const addressField = document.getElementById('addressField');

        function toggleAddress() {
            const selected = document.querySelector('input[name="role"]:checked');
            if (selected && selected.value === 'MECHANIC') {
                addressField.style.display = 'none';
            } else {
                addressField.style.display = 'block';
            }
        }

        roleRadios.forEach(r => r.addEventListener('change', toggleAddress));
        toggleAddress();
    </script>
</body>

</html>
